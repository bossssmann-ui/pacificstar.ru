<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pacific Star — ВАРИАНТ B: МАРШРУТ (The Route)
  Concept: One continuous line tells the whole story.  A small cargo-port
  mark on the left, a sweeping arc over the Pacific Ocean, and a guiding
  5-pointed star at the destination.  The route strokes through three
  colours: deep navy (origin) → ocean teal (open sea) → gold (destination).
  No enclosing shape — clean white-background / tech-forward aesthetic.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"
     role="img" aria-label="Pacific Star — Маршрут">
  <title>Pacific Star — МАРШРУТ</title>

  <defs>
    <!-- Route colour: navy → teal → gold -->
    <linearGradient id="b-route" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d2b5e"/>
      <stop offset="42%"  stop-color="#0a8fa3"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>

    <!-- Star fill gradient -->
    <radialGradient id="b-star-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff6d0"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </radialGradient>
  </defs>

  <!-- Subtle background wash -->
  <circle cx="60" cy="60" r="57" fill="#f4f7fc" opacity="0.55"/>
  <circle cx="60" cy="60" r="57" fill="none" stroke="#dde3ee" stroke-width="1"/>

  <!--
    Pacific route arc
    From port (14,82) → over the ocean (Q peak at 60,18) → to star (106,82)
    Quadratic Bézier: M 14,82  Q 60,18  106,82
  -->
  <path d="M14,82 Q60,18 106,82"
        fill="none"
        stroke="url(#b-route)"
        stroke-width="3.5"
        stroke-linecap="round"/>

  <!--
    Waypoint dots — mid-ocean landmarks on the route
    Computed from Q(14,82, 60,18, 106,82):
      t=0.25 → (36,  63)
      t=0.5  → (60,  55)
      t=0.75 → (84,  63)
  -->
  <circle cx="36" cy="63" r="3.5" fill="#0a8fa3" opacity="0.70"/>
  <circle cx="60" cy="55" r="3.5" fill="#0a8fa3" opacity="0.70"/>
  <circle cx="84" cy="63" r="3.5" fill="#0a8fa3" opacity="0.70"/>

  <!--
    Departure port (left)
    A minimal container-ship silhouette: hull rect + deck rect + funnel
  -->
  <rect x="5"  y="78" width="18" height="10" rx="2" fill="#0d2b5e"/>
  <rect x="8"  y="73" width="12" height="6"  rx="1" fill="#1a4da0"/>
  <rect x="11" y="70" width="5"  height="4"  rx="1" fill="#0d2b5e"/>

  <!--
    Destination star — Pacific Star (5-pointed)
    Centre: (106, 78), outer r=10, inner r=4.1
    Tips: 0°(106,68), 72°(115.5,71.1), 144°(111.3,81.3),
          216°(100.7,81.3), 288°(96.5,71.1)
    Notches: 36°(108.2,74.9), 108°(109.5,79.2), 180°(106,82.1),
             252°(102.5,79.2), 324°(103.8,74.9)
  -->
  <path fill="url(#b-star-g)"
    d="M106,68
       L108.2,74.9  L115.5,71.1  L109.5,79.2
       L111.3,81.3  L106,78.1
       L100.7,81.3  L102.5,79.2
       L96.5,71.1   L103.8,74.9
       Z"/>

  <!-- Star ring accent -->
  <circle cx="106" cy="75.5" r="12.5" fill="none"
          stroke="#f5a623" stroke-width="1" opacity="0.35"/>

  <!-- Company name label at bottom -->
  <text x="60" y="113"
        font-family="Inter,'Helvetica Neue',Arial,sans-serif"
        font-size="8.5" font-weight="700"
        fill="#0d2b5e" text-anchor="middle" letter-spacing="2.5">
    PACIFIC STAR
  </text>
</svg>
