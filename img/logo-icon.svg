<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Pacific Star">
  <title>Pacific Star</title>
  <defs>
    <radialGradient id="ps-icon-bg" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1d54ab"/>
      <stop offset="100%" stop-color="#091e4f"/>
    </radialGradient>
    <linearGradient id="ps-star" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="50%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#cc8014"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="57" fill="url(#ps-icon-bg)"/>

  <!-- Decorative outer ring -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtle inner ring (compass bezel) -->
  <circle cx="60" cy="60" r="44" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!--
    4-pointed navigator star (compass rose style)
    Tips:  N(60,9) · E(111,60) · S(60,111) · W(9,60)   r_outer = 51
    Waist: NE(71,49) · SE(71,71) · SW(49,71) · NW(49,49)  r_inner = 15 → 15/√2 ≈ 10.6
  -->
  <path d="M60,9 L71,49 L111,60 L71,71 L60,111 L49,71 L9,60 L49,49 Z"
        fill="url(#ps-star)"/>

  <!-- Center white disc -->
  <circle cx="60" cy="60" r="7.5" fill="white" opacity="0.92"/>

  <!-- Gold centre accent -->
  <circle cx="60" cy="60" r="3.5" fill="#f5a623"/>
</svg>
