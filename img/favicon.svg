<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#091e4f"/>
  <!-- Subtle outer ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#f5a623"
          stroke-width="0.7" opacity="0.4"/>
  <!--
    8-pointed Polaris star (scaled to 32×32):
    Cardinal r=12.5: N(16,3.5) E(28.5,16) S(16,28.5) W(3.5,16)
    Diagonal r=8:    NE(21.7,10.3) SE(21.7,21.7) SW(10.3,21.7) NW(10.3,10.3)
    Inner notch r=3.75 at 22.5° increments (8 notches)
  -->
  <path fill="#f5a623"
    d="M16,3.5
       L17.4,12.2  L21.7,10.3  L18.8,14.0
       L28.5,16
       L18.8,18.0  L21.7,21.7  L17.4,19.8
       L16,28.5
       L14.6,19.8  L10.3,21.7  L13.2,18.0
       L3.5,16
       L13.2,14.0  L10.3,10.3  L14.6,12.2
       Z"/>
  <!-- Centre white disc -->
  <circle cx="16" cy="16" r="2.5" fill="white" opacity="0.9"/>
</svg>