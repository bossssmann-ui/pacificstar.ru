<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Truck body / container -->
  <rect x="4" y="24" width="30" height="18" rx="2"/>
  <!-- Truck cab -->
  <path d="M34 30h10c2 0 4 2 5 4l2 4v4H34"/>
  <!-- Windshield -->
  <line x1="38" y1="30" x2="38" y2="42" stroke-width="1.5"/>
  <!-- Wheels -->
  <circle cx="14" cy="46" r="4"/>
  <circle cx="44" cy="46" r="4"/>
  <!-- Road -->
  <line x1="0" y1="50" x2="64" y2="50" stroke-width="1.5"/>
  <!-- Route arrow (top) -->
  <path d="M10 14h36" stroke-width="2"/>
  <polyline points="42 10 46 14 42 18" stroke-width="2"/>
  <!-- Route dots -->
  <circle cx="10" cy="14" r="2" fill="currentColor" stroke="none"/>
</svg>
