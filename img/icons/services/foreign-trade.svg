<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Globe -->
  <circle cx="32" cy="32" r="20"/>
  <!-- Globe lines (latitude) -->
  <ellipse cx="32" cy="32" rx="20" ry="8"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke-width="1.5"/>
  <!-- Globe lines (longitude) -->
  <ellipse cx="32" cy="32" rx="8" ry="20"/>
  <!-- Arrow out (export) -->
  <line x1="48" y1="14" x2="58" y2="8" stroke-width="2"/>
  <polyline points="53 8 58 8 58 13" stroke-width="2"/>
  <!-- Arrow in (import) -->
  <line x1="16" y1="50" x2="6" y2="56" stroke-width="2"/>
  <polyline points="6 51 6 56 11 56" stroke-width="2"/>
  <!-- Container accent (small) -->
  <rect x="48" y="46" width="10" height="7" rx="1" stroke-width="2"/>
</svg>
