<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Container on flatcar -->
  <rect x="10" y="18" width="32" height="20" rx="2"/>
  <!-- Container door lines -->
  <line x1="26" y1="18" x2="26" y2="38"/>
  <line x1="18" y1="24" x2="18" y2="32" stroke-width="1.5"/>
  <line x1="34" y1="24" x2="34" y2="32" stroke-width="1.5"/>
  <!-- Flatcar frame -->
  <rect x="6" y="38" width="40" height="6" rx="1"/>
  <!-- Wheels / bogies -->
  <circle cx="14" cy="48" r="4"/>
  <circle cx="38" cy="48" r="4"/>
  <!-- Rail tracks -->
  <line x1="0" y1="52" x2="64" y2="52" stroke-width="2"/>
  <!-- Crossties -->
  <line x1="4" y1="54" x2="4" y2="50" stroke-width="2"/>
  <line x1="16" y1="54" x2="16" y2="50" stroke-width="2"/>
  <line x1="28" y1="54" x2="28" y2="50" stroke-width="2"/>
  <line x1="40" y1="54" x2="40" y2="50" stroke-width="2"/>
  <line x1="52" y1="54" x2="52" y2="50" stroke-width="2"/>
</svg>
