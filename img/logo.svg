<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pacific Star — ПОЛЯРИС Full Horizontal Logo
  Icon (left) + two-colour wordmark (right).
  Colour: navy #0d2b5e + gold #f5a623 on white.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120"
     role="img" aria-label="Pacific Star — Транспорт и Логистика">
  <title>Pacific Star — Транспорт и Логистика</title>

  <defs>
    <radialGradient id="lg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5a623" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0d2b5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lg-star" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff8e1"/>
      <stop offset="22%"  stop-color="#ffe066"/>
      <stop offset="45%"  stop-color="#f5a623"/>
      <stop offset="72%"  stop-color="#1d54ab"/>
      <stop offset="100%" stop-color="#091e4f"/>
    </radialGradient>
    <radialGradient id="lg-bg" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#1d54ab"/>
      <stop offset="100%" stop-color="#091e4f"/>
    </radialGradient>
  </defs>

  <!-- ── ICON MARK ── -->
  <circle cx="60" cy="60" r="57" fill="url(#lg-bg)"/>
  <circle cx="60" cy="60" r="55" fill="none" stroke="#f5a623"
          stroke-width="1.2" opacity="0.35"/>
  <circle cx="60" cy="60" r="57" fill="url(#lg-glow)"/>
  <path fill="url(#lg-star)"
    d="M60,10
       L65.7,46.2  L82.6,37.4  L73.9,54.3
       L110,60
       L73.9,65.7  L82.6,82.6  L65.7,73.8
       L60,110
       L54.3,73.8  L37.4,82.6  L46.1,65.7
       L10,60
       L46.1,54.3  L37.4,37.4  L54.3,46.2
       Z"/>
  <circle cx="60" cy="60" r="6"  fill="white" opacity="0.9"/>
  <circle cx="60" cy="60" r="3"  fill="#f5a623"/>

  <!-- ── WORDMARK ── -->
  <!--  "PACIFIC" large navy  |  "STAR" large gold — same size, same baseline  -->
  <text font-family="Inter,'Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="42" y="72">
    <tspan x="138" fill="#0d2b5e" letter-spacing="-1.5">PACIFIC</tspan>
    <tspan fill="#f5a623"         letter-spacing="-1.5" dx="10">STAR</tspan>
  </text>

  <!-- Thin rule under the wordmark -->
  <line x1="138" y1="81" x2="450" y2="81"
        stroke="#0d2b5e" stroke-width="0.6" opacity="0.15"/>

  <!-- Tagline -->
  <text x="140" y="99"
        font-family="Inter,'Helvetica Neue',Arial,sans-serif"
        font-weight="500" font-size="11"
        fill="#7a8899" letter-spacing="4">ЛОГИСТИКА</text>

  <!-- Founding year -->
  <text x="292" y="99"
        font-family="Inter,'Helvetica Neue',Arial,sans-serif"
        font-weight="400" font-size="11"
        fill="#b0bbc8" letter-spacing="1">· С 2012</text>
</svg>

