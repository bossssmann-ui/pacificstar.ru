<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тест Pacific Star</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0a3d6b;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:16px;padding:40px;max-width:440px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)}
h1{color:#15803d;font-size:28px;margin:0 0 12px}
p{color:#374151;font-size:16px;line-height:1.6;margin:0 0 20px}
.ok{background:#f0fdf4;border:2px solid #16a34a;border-radius:8px;padding:16px;color:#166534;font-weight:700;font-size:15px}
a{display:inline-block;margin-top:20px;background:#0a3d6b;color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-weight:700}
</style>
</head>
<body>
<div class="box">
  <div style="font-size:64px;margin-bottom:12px">✅</div>
  <h1>Файлы на месте!</h1>
  <p>Этот файл открылся — значит все файлы сайта лежат в правильной папке на сервере.</p>
  <div class="ok">Теперь откройте главную страницу сайта</div>
  <a href="/">Открыть сайт →</a>
</div>
</body>
</html>
