name: Deploy — Timeweb pacificstar.ru

# Запускается автоматически при каждом обновлении кода
on:
  push:
    branches:
      - main
      - copilot/refactor-site-description
  workflow_dispatch:   # ← ручной запуск через кнопку на GitHub

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Автодеплой на Timeweb (rsync + SSH с паролем)
  # Сервер: 185.114.247.170  |  Логин: ct38770
  # Пароль — в GitHub Secrets → TIMEWEB_PASSWORD (никогда в коде!)
  # Инструкция: TIMEWEB_DEPLOY.md
  # ─────────────────────────────────────────────────────────────
  deploy-timeweb:
    runs-on: ubuntu-latest
    # Пропускается, пока не добавлен секрет TIMEWEB_PASSWORD
    if: ${{ secrets.TIMEWEB_PASSWORD != '' }}
    steps:
      - name: Скачать код сайта
        uses: actions/checkout@v4

      - name: Установить sshpass (нужен для пароля)
        run: sudo apt-get install -y sshpass

      - name: Принять SSH-ключ сервера (без ручного подтверждения)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 -H 185.114.247.170 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Подготовить папку с файлами сайта
        run: |
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='previews/' \
            --exclude='*.md' \
            --exclude='TILDA_*' \
            --exclude='HOSTING_*' \
            --exclude='TIMEWEB_*' \
            --exclude='SESSION_*' \
            --exclude='package*.json' \
            --exclude='.htmlvalidate.json' \
            --exclude='.gitignore' \
            ./ /tmp/site/

      - name: Загрузить файлы сайта на Timeweb
        env:
          SSHPASS: ${{ secrets.TIMEWEB_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -p 22 -o StrictHostKeyChecking=no" \
            /tmp/site/ \
            ct38770@185.114.247.170:/home/ct38770/public_html/

      - name: Проверить что сайт доступен
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 http://pacificstar.ru/ || echo "000")
          echo "HTTP статус: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Сайт работает!"
          else
            echo "⚠️ Сайт ответил кодом $HTTP_CODE — проверьте вручную"
          fi

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Резервная публикация на GitHub Pages
  # Работает всегда — служит резервом и CDN для статических файлов
  # ─────────────────────────────────────────────────────────────
  github-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Настроить GitHub Pages
        uses: actions/configure-pages@v5

      - name: Загрузить файлы сайта
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Опубликовать на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
