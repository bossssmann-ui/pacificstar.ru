name: Deploy — pacificstar.ru на Timeweb

# Автоматически при push в main + можно запустить вручную
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-timeweb
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Деплой сайта на Timeweb через FTP (надёжнее SSH для shared hosting)
  # Хост, логин и пароль хранятся в GitHub Secrets
  # ─────────────────────────────────────────────────────────────
  deploy-timeweb:
    name: 🚀 Загрузить сайт на Timeweb
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TW_HOST: ${{ secrets.TIMEWEB_HOST }}
      TW_USER: ${{ secrets.TIMEWEB_USER }}
      TW_PATH: /public_html/
      TW_PASS: ${{ secrets.TIMEWEB_PASSWORD }}

    steps:
      - name: Скачать код сайта
        uses: actions/checkout@v4

      - name: Проверить — добавлен ли пароль?
        run: |
          if [ -z "$TW_PASS" ]; then
            echo "⚠️  ПАРОЛЬ НЕ ДОБАВЛЕН — добавьте секрет TIMEWEB_PASSWORD:"
            echo "  https://github.com/bossssmann-ui/pacificstar.ru/settings/secrets/actions"
            echo "SKIP=true" >> "$GITHUB_ENV"
          else
            echo "✅ Пароль найден — начинаем загрузку"
            echo "SKIP=false" >> "$GITHUB_ENV"
          fi

      - name: Подставить PS_YM_ID (Яндекс.Метрика)
        if: env.SKIP == 'false'
        env:
          PS_YM_ID: ${{ secrets.PS_YM_ID }}
        run: node scripts/inject-ym-id.js

      - name: Сгенерировать api/mail-config.php (SMTP из GitHub Secrets)
        if: env.SKIP == 'false'
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: smtp.timeweb.ru
          SMTP_USER: noreply@pacificstar.ru
          MAIL_FROM: noreply@pacificstar.ru
          CONTACT_EMAIL: sales@pacificstar.ru
          CORS_ORIGIN: https://pacificstar.ru
        run: |
          sudo apt-get install -y php-cli -q
          if [ -z "$SMTP_PASS" ]; then
            echo "ℹ️  SMTP_PASS не задан — почта через Timeweb Exim (mail -f), без внешнего SMTP"
            cp api/mail-config.example.php api/mail-config.php
          else
            php scripts/generate-mail-config.php
          fi

      - name: Подготовить файлы сайта (без служебных файлов)
        if: env.SKIP == 'false'
        run: |
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.vscode/' \
            --exclude='previews/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='test.html' \
            --exclude='DEPLOY_GUIDE.html' \
            --exclude='*.zip' \
            --exclude='SESSION_STATE.md' \
            --exclude='HOSTING_GUIDE.md' \
            --exclude='TIMEWEB_DEPLOY.md' \
            --exclude='README.md' \
            --exclude='TILDA_COPILOT_ACCESS.md' \
            --exclude='TILDA_SETUP.md' \
            --exclude='package*.json' \
            --exclude='Dockerfile' \
            --exclude='.dockerignore' \
            --exclude='.htmlvalidate.json' \
            --exclude='.gitignore' \
            ./ /tmp/site/
          echo "📦 Файлы для загрузки:"
          ls -la /tmp/site/
          echo "📊 Всего файлов: $(find /tmp/site -type f | wc -l)"

      # ── Загрузка: FTP (lftp), при сбое — SSH/rsync ─────────────────────
      - name: Установить инструменты деплоя
        if: env.SKIP == 'false'
        run: sudo apt-get install -y lftp sshpass -q

      - name: Загрузить файлы на Timeweb (SSH → FTP fallback)
        if: env.SKIP == 'false'
        timeout-minutes: 18
        env:
          LFTP_PASSWORD: ${{ secrets.TIMEWEB_PASSWORD }}
          SSHPASS: ${{ secrets.TIMEWEB_PASSWORD }}
        run: |
          set -euo pipefail

          deploy_ftp() {
            local attempt="$1"
            echo "── FTP попытка ${attempt} ──"
            lftp -u "$TW_USER,$LFTP_PASSWORD" "ftp://$TW_HOST" <<'LFTP_CMDS'
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ftp:passive-mode yes
          set ftp:prefer-epsv no
          set net:timeout 90
          set net:max-retries 8
          set net:reconnect-interval-base 8
          set net:reconnect-interval-multiplier 1.5
          set net:reconnect-interval-max 45
          set xfer:clobber on
          set cmd:fail-exit yes
          lcd /tmp/site
          mirror --reverse --verbose --parallel=1 api /public_html/api
          mirror --reverse --verbose --parallel=1 \
            --exclude-glob .git* \
            --exclude-glob api/ \
            --exclude-glob *.md \
            --exclude-glob test.html \
            --exclude-glob DEPLOY_GUIDE.html \
            --exclude-glob previews/ \
            --exclude-glob node_modules/ \
            --exclude-glob .env* \
            --exclude-glob .vscode/ \
            --exclude-glob Dockerfile \
            --exclude-glob .dockerignore \
            --exclude-glob *.zip \
            . /public_html/
          bye
          LFTP_CMDS
          }

          deploy_ssh() {
            echo "── SSH/rsync fallback ──"
            mkdir -p ~/.ssh
            ssh-keyscan -p 22 -T 15 "$TW_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
            sshpass -e rsync -avz --timeout=120 \
              -e "ssh -p 22 -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15" \
              /tmp/site/ \
              "$TW_USER@$TW_HOST:~/public_html/"
          }

          UPLOAD_OK=false

          echo "── SSH/rsync (основной метод) ──"
          if deploy_ssh; then
            UPLOAD_OK=true
            echo "✅ SSH/rsync загрузка завершена"
          fi

          if [ "$UPLOAD_OK" = "false" ]; then
            echo "⚠️ SSH не удался — пробуем FTP..."
            for attempt in 1 2 3; do
              if deploy_ftp "$attempt"; then
                UPLOAD_OK=true
                echo "✅ FTP загрузка завершена"
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "⚠️ FTP попытка $attempt не удалась, ждём 20 секунд..."
                sleep 20
              fi
            done
          fi

          if [ "$UPLOAD_OK" = "false" ]; then
            echo "❌ Не удалось загрузить файлы ни через FTP, ни через SSH"
            exit 1
          fi

      - name: Проверить api/health.php после деплоя
        if: env.SKIP == 'false'
        run: |
          sleep 5
          HEALTH=$(curl -sS -m 20 "https://pacificstar.ru/api/health.php" 2>/dev/null || echo "fail")
          echo "health.php: $HEALTH"
          if echo "$HEALTH" | grep -q '"exim"'; then
            echo "✅ PHP API обновлён (новая версия)"
          elif echo "$HEALTH" | grep -q '"backend":"php"'; then
            echo "✅ PHP API на месте"
          else
            echo "⚠️ api/health.php пока недоступен — подождите 1–2 мин или проверьте вручную"
          fi

      - name: Проверить доступность сайта
        if: env.SKIP == 'false'
        run: |
          sleep 3
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 https://pacificstar.ru/ 2>/dev/null) || HTTP="000"
          echo "Ответ сервера: HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "301" ] || [ "$HTTP" = "302" ]; then
            echo "🎉 САЙТ ОНЛАЙН: https://pacificstar.ru/"
          else
            echo "⚠️ Код $HTTP — возможно, DNS ещё не обновился. Проверьте https://pacificstar.ru/ вручную через 5 минут."
          fi
