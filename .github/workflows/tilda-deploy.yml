name: Deploy to Tilda & GitHub Pages

# Runs automatically on every push to main / copilot branch
on:
  push:
    branches:
      - main
      - copilot/refactor-site-description
  workflow_dispatch:   # ← allows manual run from GitHub UI

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Publish to GitHub Pages (CDN for CSS/JS)
  # Always runs, no Tilda keys required
  # ─────────────────────────────────────────────────────────────
  github-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Push updated pages to Tilda via API
  # Only runs when TILDA_PUBLIC_KEY secret is configured
  # ─────────────────────────────────────────────────────────────
  tilda-sync:
    runs-on: ubuntu-latest
    needs: github-pages
    # Skip gracefully if secrets are not yet configured
    if: ${{ vars.TILDA_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || true

      - name: Push pages to Tilda
        env:
          TILDA_PUBLIC_KEY: ${{ secrets.TILDA_PUBLIC_KEY }}
          TILDA_SECRET_KEY: ${{ secrets.TILDA_SECRET_KEY }}
          TILDA_PROJECT_ID: ${{ secrets.TILDA_PROJECT_ID }}
          CDN_BASE: https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}
        run: node .github/scripts/tilda-push.js
