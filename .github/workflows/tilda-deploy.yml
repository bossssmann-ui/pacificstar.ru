name: Deploy — Timeweb + GitHub Pages

# Запускается автоматически при каждом обновлении кода
on:
  push:
    branches:
      - main
      - copilot/refactor-site-description
  workflow_dispatch:   # ← ручной запуск через кнопку на GitHub

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Автодеплой на Timeweb (SSH/rsync)
  # Запускается когда добавлен секрет VPS_HOST
  # Инструкция: TIMEWEB_DEPLOY.md
  # ─────────────────────────────────────────────────────────────
  deploy-timeweb:
    runs-on: ubuntu-latest
    # Пропускается, пока не добавлены SSH-секреты
    if: ${{ secrets.VPS_HOST != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Установить SSH-ключ
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Загрузить файлы сайта на Timeweb
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='previews/' \
            --exclude='*.md' \
            --exclude='package*.json' \
            --exclude='.htmlvalidate.json' \
            --exclude='.gitignore' \
            ./ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}"

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Автодеплой на Timeweb через SFTP (альтернативный)
  # Используется если SSH-ключ недоступен, но есть логин/пароль
  # Запускается когда добавлены секреты FTP_HOST + FTP_PASSWORD
  # ─────────────────────────────────────────────────────────────
  deploy-timeweb-sftp:
    runs-on: ubuntu-latest
    if: ${{ secrets.FTP_HOST != '' && secrets.VPS_HOST == '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Подготовить файлы для загрузки
        run: |
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='previews/' \
            --exclude='*.md' \
            --exclude='package*.json' \
            --exclude='.htmlvalidate.json' \
            --exclude='.gitignore' \
            ./ /tmp/site/

      - name: Загрузить на Timeweb через SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: /tmp/site/
          server-dir: ${{ secrets.FTP_PATH }}
          protocol: ftps
          port: 21

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Публикация на GitHub Pages (резервная копия / CDN)
  # Работает всегда, ключи не нужны
  # ─────────────────────────────────────────────────────────────
  github-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Синхронизация с Tilda (если используется)
  # Запускается только когда задана переменная TILDA_ENABLED=true
  # ─────────────────────────────────────────────────────────────
  tilda-sync:
    runs-on: ubuntu-latest
    needs: github-pages
    if: ${{ vars.TILDA_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || true

      - name: Push pages to Tilda
        env:
          TILDA_PUBLIC_KEY: ${{ secrets.TILDA_PUBLIC_KEY }}
          TILDA_SECRET_KEY: ${{ secrets.TILDA_SECRET_KEY }}
          TILDA_PROJECT_ID: ${{ secrets.TILDA_PROJECT_ID }}
          CDN_BASE: https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}
        run: node .github/scripts/tilda-push.js
