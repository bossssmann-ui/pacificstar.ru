name: Deploy — pacificstar.ru на Timeweb

# Запускается автоматически при каждом push в ветку copilot/refactor-site-description
# (одобрение больше не требуется — настройки Actions изменены владельцем).
# Также можно запустить вручную: Actions → Deploy → Run workflow.
on:
  push:
    branches:
      - copilot/refactor-site-description
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Деплой сайта на Timeweb через FTP (надёжнее SSH для shared hosting)
  # Сервер: 185.114.247.170  |  Логин: ct38770
  # Пароль хранится в GitHub Secrets → TIMEWEB_PASSWORD
  # ─────────────────────────────────────────────────────────────
  deploy-timeweb:
    name: 🚀 Загрузить сайт на Timeweb
    runs-on: ubuntu-latest
    env:
      TW_HOST: 185.114.247.170
      TW_USER: ct38770
      TW_PATH: /public_html/
      TW_PASS: ${{ secrets.TIMEWEB_PASSWORD }}

    steps:
      - name: Скачать код сайта
        uses: actions/checkout@v4

      - name: Проверить — добавлен ли пароль?
        run: |
          if [ -z "$TW_PASS" ]; then
            echo "⚠️  ПАРОЛЬ НЕ ДОБАВЛЕН — добавьте секрет TIMEWEB_PASSWORD:"
            echo "  https://github.com/bossssmann-ui/pacificstar.ru/settings/secrets/actions"
            echo "SKIP=true" >> "$GITHUB_ENV"
          else
            echo "✅ Пароль найден — начинаем загрузку"
            echo "SKIP=false" >> "$GITHUB_ENV"
          fi

      - name: Подготовить файлы сайта (без служебных файлов)
        if: env.SKIP == 'false'
        run: |
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='previews/' \
            --exclude='SESSION_STATE.md' \
            --exclude='HOSTING_GUIDE.md' \
            --exclude='TIMEWEB_DEPLOY.md' \
            --exclude='TILDA_COPILOT_ACCESS.md' \
            --exclude='TILDA_SETUP.md' \
            --exclude='package*.json' \
            --exclude='.htmlvalidate.json' \
            --exclude='.gitignore' \
            --exclude='site-pacificstar.zip' \
            ./ /tmp/site/
          echo "📦 Файлы для загрузки:"
          ls /tmp/site/

      # ── Метод 1: FTP через lftp (надёжнее для shared hosting) ──────────
      - name: Установить lftp
        if: env.SKIP == 'false'
        run: sudo apt-get install -y lftp -q

      - name: Загрузить файлы через FTP
        if: env.SKIP == 'false'
        env:
          LFTP_PASSWORD: ${{ secrets.TIMEWEB_PASSWORD }}
        run: |
          lftp -u "$TW_USER,$LFTP_PASSWORD" "ftp://$TW_HOST" <<'LFTP_CMDS'
            set ftp:ssl-allow no
            set net:timeout 30
            set net:max-retries 3
            mirror --reverse --delete --verbose \
              --exclude-glob .git* \
              --exclude-glob *.md \
              --exclude-glob previews/ \
              --exclude-glob node_modules/ \
              --exclude-glob site-pacificstar.zip \
              /tmp/site/ /public_html/
            bye
          LFTP_CMDS
          echo "✅ FTP загрузка завершена"

      # ── Метод 2: SSH/rsync как запасной ─────────────────────────────────
      - name: Попробовать SSH/rsync как запасной метод (если FTP не сработал)
        if: env.SKIP == 'false'
        continue-on-error: true
        env:
          SSHPASS: ${{ secrets.TIMEWEB_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -q 2>/dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 -T 10 "$TW_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          sshpass -e rsync -avz \
            -e "ssh -p 22 -o StrictHostKeyChecking=no -o ConnectTimeout=10" \
            /tmp/site/ \
            "$TW_USER@$TW_HOST:/home/$TW_USER/public_html/" \
            2>&1 | tail -5 || echo "SSH недоступен — FTP был основным методом"

      - name: Проверить доступность сайта
        if: env.SKIP == 'false'
        run: |
          sleep 5
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 https://pacificstar.ru/ 2>/dev/null || echo "000")
          echo "Ответ сервера: HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "301" ] || [ "$HTTP" = "302" ]; then
            echo "🎉 САЙТ ОНЛАЙН: https://pacificstar.ru/"
          else
            echo "⚠️ Код $HTTP — возможно, DNS ещё не обновился. Проверьте https://pacificstar.ru/ вручную через 5 минут."
          fi
