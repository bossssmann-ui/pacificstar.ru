name: Deploy — pacificstar.ru на Timeweb

# Запускается: ТОЛЬКО вручную — кнопкой «Run workflow» на странице Actions.
# Автоматический запуск отключён, чтобы не требовалось одобрение каждый раз.
# Инструкция: https://github.com/bossssmann-ui/pacificstar.ru/blob/copilot/refactor-site-description/DEPLOY_GUIDE.html
on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Деплой сайта на Timeweb
  # Сервер: 185.114.247.170  |  Логин: ct38770
  # Пароль хранится в GitHub Secrets → TIMEWEB_PASSWORD
  # ─────────────────────────────────────────────────────────────
  deploy-timeweb:
    name: 🚀 Загрузить сайт на Timeweb
    runs-on: ubuntu-latest
    env:
      TW_HOST: 185.114.247.170
      TW_USER: ct38770
      TW_PATH: /home/ct38770/public_html/
      TW_PASS: ${{ secrets.TIMEWEB_PASSWORD }}
    steps:
      - name: Скачать код сайта
        uses: actions/checkout@v4

      - name: Проверить — добавлен ли пароль?
        run: |
          if [ -z "$TW_PASS" ]; then
            echo ""
            echo "═══════════════════════════════════════════════════════"
            echo "  ⚠️  ПАРОЛЬ НЕ ДОБАВЛЕН"
            echo ""
            echo "  Нужно добавить секрет TIMEWEB_PASSWORD:"
            echo "  https://github.com/bossssmann-ui/pacificstar.ru/settings/secrets/actions"
            echo "═══════════════════════════════════════════════════════"
            echo ""
            echo "SKIP=true" >> "$GITHUB_ENV"
          else
            echo "✅ Пароль найден — начинаем загрузку на сервер"
            echo "SKIP=false" >> "$GITHUB_ENV"
          fi

      - name: Установить sshpass
        if: env.SKIP == 'false'
        run: sudo apt-get install -y sshpass -q

      - name: Добавить ключ сервера в доверенные
        if: env.SKIP == 'false'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 "$TW_HOST" >> ~/.ssh/known_hosts 2>/dev/null || \
          ssh-keyscan -p 22 -T 10 "$TW_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Подготовить файлы (без служебных папок)
        if: env.SKIP == 'false'
        run: |
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='previews/' \
            --exclude='*.md' \
            --exclude='*.txt' \
            --exclude='package*.json' \
            --exclude='.htmlvalidate.json' \
            --exclude='.gitignore' \
            ./ /tmp/site/
          echo "Файлы для загрузки:"
          ls /tmp/site/

      - name: Загрузить файлы на Timeweb (SSH/rsync)
        if: env.SKIP == 'false'
        env:
          SSHPASS: ${{ secrets.TIMEWEB_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -p 22 -o StrictHostKeyChecking=no -o ConnectTimeout=15" \
            /tmp/site/ \
            "$TW_USER@$TW_HOST:$TW_PATH"

      - name: Проверить доступность сайта
        if: env.SKIP == 'false'
        run: |
          sleep 8
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 https://pacificstar.ru/ 2>/dev/null \
               || curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 http://pacificstar.ru/ 2>/dev/null \
               || echo "000")
          echo "Ответ сервера: HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "301" ] || [ "$HTTP" = "302" ]; then
            echo "✅ Сайт онлайн! https://pacificstar.ru/"
          else
            echo "⚠️ Код $HTTP — проверьте https://pacificstar.ru/ вручную"
          fi

      - name: Итог
        if: env.SKIP == 'true'
        run: |
          echo ""
          echo "Деплой пропущен — пароль не добавлен."
          echo "Инструкция: TIMEWEB_DEPLOY.md в репозитории"
