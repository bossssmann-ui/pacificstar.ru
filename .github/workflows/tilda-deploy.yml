name: Deploy — pacificstar.ru на Timeweb

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TW_HOST: ${{ vars.TIMEWEB_HOST }}
      TW_USER: ${{ vars.TIMEWEB_USER }}
      TW_PASS: ${{ secrets.TIMEWEB_PASSWORD }}
      TW_PATH: ${{ vars.TIMEWEB_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          if [ -z "$TW_PASS" ] || [ -z "$TW_HOST" ] || [ -z "$TW_USER" ] || [ -z "$TW_PATH" ]; then
            echo "TIMEWEB_PASSWORD secret or TIMEWEB_HOST/TIMEWEB_USER/TIMEWEB_PATH variables are not set"
            exit 1
          fi

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload site files via FTP
        run: |
          lftp -u "$TW_USER,$TW_PASS" "ftp://$TW_HOST" <<'EOF'
            set ftp:ssl-allow no
            set net:max-retries 3
            set net:timeout 30
            mirror --reverse --delete --verbose \
              --exclude-glob .git* \
              --exclude-glob .github/ \
              "$GITHUB_WORKSPACE/" "$TW_PATH"
            bye
          EOF
