name: Deploy — pacificstar.ru на Timeweb

# Автоматически при push в main + можно запустить вручную
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-timeweb
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Деплой сайта на Timeweb через FTP (надёжнее SSH для shared hosting)
  # Хост, логин и пароль хранятся в GitHub Secrets
  # ─────────────────────────────────────────────────────────────
  deploy-timeweb:
    name: 🚀 Загрузить сайт на Timeweb
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TW_HOST: ${{ secrets.TIMEWEB_HOST }}
      TW_USER: ${{ secrets.TIMEWEB_USER }}
      TW_PATH: /public_html/
      TW_PASS: ${{ secrets.TIMEWEB_PASSWORD }}

    steps:
      - name: Скачать код сайта
        uses: actions/checkout@v4

      - name: Проверить — добавлен ли пароль?
        run: |
          if [ -z "$TW_PASS" ]; then
            echo "⚠️  ПАРОЛЬ НЕ ДОБАВЛЕН — добавьте секрет TIMEWEB_PASSWORD:"
            echo "  https://github.com/bossssmann-ui/pacificstar.ru/settings/secrets/actions"
            echo "SKIP=true" >> "$GITHUB_ENV"
          else
            echo "✅ Пароль найден — начинаем загрузку"
            echo "SKIP=false" >> "$GITHUB_ENV"
          fi

      - name: Подготовить файлы сайта (без служебных файлов)
        if: env.SKIP == 'false'
        run: |
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.vscode/' \
            --exclude='previews/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.php' \
            --exclude='test.html' \
            --exclude='DEPLOY_GUIDE.html' \
            --exclude='*.zip' \
            --exclude='SESSION_STATE.md' \
            --exclude='HOSTING_GUIDE.md' \
            --exclude='TIMEWEB_DEPLOY.md' \
            --exclude='README.md' \
            --exclude='TILDA_COPILOT_ACCESS.md' \
            --exclude='TILDA_SETUP.md' \
            --exclude='package*.json' \
            --exclude='Dockerfile' \
            --exclude='.dockerignore' \
            --exclude='.htmlvalidate.json' \
            --exclude='.gitignore' \
            ./ /tmp/site/
          echo "📦 Файлы для загрузки:"
          ls -la /tmp/site/
          echo "📊 Всего файлов: $(find /tmp/site -type f | wc -l)"

      # ── Метод 1: FTP через lftp (надёжнее для shared hosting) ──────────
      - name: Установить lftp
        if: env.SKIP == 'false'
        run: sudo apt-get install -y lftp -q

      - name: Загрузить файлы через FTP
        if: env.SKIP == 'false'
        timeout-minutes: 10
        env:
          LFTP_PASSWORD: ${{ secrets.TIMEWEB_PASSWORD }}
        run: |
          FTP_OK=false
          for attempt in 1 2 3; do
            echo "── Попытка $attempt из 3 ──"
            if lftp -u "$TW_USER,$LFTP_PASSWORD" "ftp://$TW_HOST" <<'LFTP_CMDS'; then
              set ftp:ssl-allow yes
              set ftp:ssl-force no
              set ftp:passive-mode yes
              set net:timeout 20
              set net:max-retries 2
              set net:reconnect-interval-base 5
              set net:reconnect-interval-multiplier 2
              set net:reconnect-interval-max 20
              set xfer:clobber on
              set cmd:fail-exit yes
              lcd /tmp/site
              mkdir -p /public_html/
              mirror --reverse --delete --verbose --parallel=1 \
                --exclude-glob .git* \
                --exclude-glob *.md \
                --exclude-glob *.php \
                --exclude-glob test.html \
                --exclude-glob DEPLOY_GUIDE.html \
                --exclude-glob previews/ \
                --exclude-glob node_modules/ \
                --exclude-glob .env* \
                --exclude-glob .vscode/ \
                --exclude-glob Dockerfile \
                --exclude-glob .dockerignore \
                --exclude-glob *.zip \
                . /public_html/
              bye
          LFTP_CMDS
              FTP_OK=true
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "⚠️ Попытка $attempt не удалась, ждём 15 секунд..."
              sleep 15
            fi
          done
          if [ "$FTP_OK" = "true" ]; then
            echo "✅ FTP загрузка завершена"
          else
            echo "❌ FTP загрузка не удалась после 3 попыток"
            exit 1
          fi

      # ── Метод 2: SSH/rsync как запасной ─────────────────────────────────
      - name: Попробовать SSH/rsync как запасной метод (если FTP не сработал)
        if: env.SKIP == 'false'
        continue-on-error: true
        env:
          SSHPASS: ${{ secrets.TIMEWEB_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -q 2>/dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 -T 10 "$TW_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          sshpass -e rsync -avz \
            -e "ssh -p 22 -o StrictHostKeyChecking=no -o ConnectTimeout=10" \
            /tmp/site/ \
            "$TW_USER@$TW_HOST:~/public_html/" \
            2>&1 | tail -5 || echo "SSH недоступен — FTP был основным методом"

      - name: Проверить доступность сайта
        if: env.SKIP == 'false'
        run: |
          sleep 3
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 https://pacificstar.ru/ 2>/dev/null) || HTTP="000"
          echo "Ответ сервера: HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "301" ] || [ "$HTTP" = "302" ]; then
            echo "🎉 САЙТ ОНЛАЙН: https://pacificstar.ru/"
          else
            echo "⚠️ Код $HTTP — возможно, DNS ещё не обновился. Проверьте https://pacificstar.ru/ вручную через 5 минут."
          fi
